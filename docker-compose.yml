version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: helpdesk-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: helpdesk-backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/helpdesk
      - JWT_SECRET=supersecret
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: helpdesk-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: